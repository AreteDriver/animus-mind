version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: animus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-animus}
      POSTGRES_DB: animus_mind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../..
      dockerfile: infra/local/Dockerfile
    environment:
      ANIMUS_DATABASE_URL: ${ANIMUS_DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
